name: Release

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node (no registry-url to avoid authToken pollution)
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Upgrade npm for full OIDC trusted publishing support
        run: |
          npm install -g npm@latest
          echo "npm version: $(npm --version)"

      - name: Configure npm for OIDC
        run: |
          npm config set registry https://registry.npmjs.org/
          npm config set provenance true

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Publish packages via OIDC trusted publishing
        run: bash scripts/publish-oidc.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create version PR if there are pending changesets
        uses: changesets/action@v1
        with:
          publish: false
          version: npx changeset version
          title: "chore(release): version packages"
          commit: "chore(release): version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
